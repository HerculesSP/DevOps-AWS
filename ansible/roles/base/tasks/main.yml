- name: Instalar Docker
  ansible.builtin.package:
    name: docker
    state: present

- name: Habilitar e iniciar Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Criar diretório do plugin Docker CLI
  ansible.builtin.file:
    path: /usr/local/lib/docker/cli-plugins
    state: directory
    mode: "0755"

- name: Instalar Docker Compose v2
  ansible.builtin.get_url:
    url: "https://github.com/docker/compose/releases/download/v2.29.0/docker-compose-linux-x86_64"
    dest: "/usr/local/lib/docker/cli-plugins/docker-compose"
    mode: "0755"

- name: Validar Docker Compose v2
  ansible.builtin.command: docker compose version
  register: docker_compose_version
  changed_when: false

- name: Criar diretório do projeto
  ansible.builtin.file:
    path: /opt/app/nginx
    state: directory
    mode: "0755"
