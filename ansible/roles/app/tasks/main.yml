- name: Instalar Docker
  ansible.builtin.package:
    name: docker
    state: present

- name: Habilitar e iniciar Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Criar diretório do plugin Docker CLI
  ansible.builtin.file:
    path: /usr/local/lib/docker/cli-plugins
    state: directory
    mode: "0755"

- name: Instalar Docker Compose v2
  ansible.builtin.get_url:
    url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
    dest: /usr/local/lib/docker/cli-plugins/docker-compose
    mode: "0755"

- name: Validar Docker Compose v2
  ansible.builtin.command: docker compose version
  register: docker_compose_version
  changed_when: false

- name: Criar diretório do projeto
  ansible.builtin.file:
    path: /opt/app/nginx
    state: directory
    mode: "0755"

- name: Renderizar docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/app/docker-compose.yml
    mode: "0644"

- name: Renderizar arquivo .env
  ansible.builtin.template:
    src: app.env.j2
    dest: /opt/app/.env
    mode: "0600"

- name: Renderizar configuração do nginx
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /opt/app/nginx/default.conf
    mode: "0644"

- name: Subir stack Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/app
    state: present
    pull: always

- name: Esperar app1 ficar healthy
  community.docker.docker_container_info:
    name: app1
  register: app1_info
  until: app1_info.container.State.Health.Status == 'healthy'
  retries: 30
  delay: 5

- name: Esperar app2 ficar healthy
  community.docker.docker_container_info:
    name: app2
  register: app2_info
  until: app2_info.container.State.Health.Status == 'healthy'
  retries: 30
  delay: 5