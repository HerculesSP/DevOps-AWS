- name: Instalar Docker
  ansible.builtin.package:
    name: docker
    state: present

- name: Habilitar e iniciar Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Criar diretório do projeto
  ansible.builtin.file:
    path: /opt/app
    state: directory
    mode: "0755"

- name: Renderizar docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/app/docker-compose.yml
    mode: "0644"

- name: Renderizar arquivo .env
  ansible.builtin.template:
    src: app.env.j2
    dest: /opt/app/.env
    mode: "0600"

- name: Subir stack Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/app
    state: present
    pull: always